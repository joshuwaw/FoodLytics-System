name: Deploy Backend to Azure

on:
  push:
    branches: [ main ]
    paths: [ 'backend/**' ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name acrfoodlytics123

      - name: Build and Push Docker Image
        run: |
          docker build -t acrfoodlytics123.azurecr.io/backend:latest ./backend
          docker push acrfoodlytics123.azurecr.io/backend:latest

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ca-foodlytics-backend \
            --resource-group rg-foodlytics \
            --image acrfoodlytics123.azurecr.io/backend:latest
